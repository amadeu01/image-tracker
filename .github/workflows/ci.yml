name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: fmt / clippy / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: cargo build --release
        run: cargo build --workspace --release

  smoke:
    name: smoke — accuracy vs ground truth (main only)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      # Runs scripts/smoke-report.sh: builds the release binary, then the 5
      # scriptable checks — CLI usage, v3/v4 headless track ACCURACY graded
      # against groundtruth/*.csv (>=80%/90% within 0.1 plate-dia), exports
      # present, banner/log. The script exits non-zero if any check fails.
      # Accuracy (not CSV row count) is the gate: a row count rewarded the
      # confident-drift fabrication that once let a tracking regression pass.
      - name: Run smoke (accuracy checks)
        run: SMOKE_TESTER="GitHub Actions CI" SMOKE_MODEL="n/a (CI)" ./scripts/smoke-report.sh

      - name: Upload smoke report + outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: docs/smoke/*.md
          retention-days: 14
